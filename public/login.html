<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMS — Вход в систему</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="icon">🎓</div>
        <h1>LMS</h1>
        <p>Система управления обучением</p>
      </div>

      <div id="login-error" class="alert alert-danger" style="display:none;"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="Введите email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" class="form-control" placeholder="Введите пароль" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">
          Войти
        </button>
      </form>

      <div style="text-align:center; margin-top:24px; color: var(--text-light); font-size:13px;">
        По умолчанию: admin@lms.com / admin123
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Check if already logged in
    const token = getToken();
    const user = getUser();
    if (token && user) {
      window.location.href = user.role === 'ADMIN' ? '/admin.html' : '/student.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errDiv = document.getElementById('login-error');
      errDiv.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Вход...';

      try {
        const data = await api('/auth/login', {
          method: 'POST',
          body: {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          }
        });

        if (data && data.token) {
          setToken(data.token);
          setUser(data.user);
          window.location.href = data.user.role === 'ADMIN' ? '/admin.html' : '/student.html';
        }
      } catch (err) {
        errDiv.textContent = err.message;
        errDiv.style.display = 'flex';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Войти';
      }
    });
  </script>
</body>
</html>
